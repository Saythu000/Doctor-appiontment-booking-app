name: phia_flutter
description: "PHIA (Personal Health Insight Assistance) - Hardware-based sensor tracker."
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^6.0.0
  pedometer: ^4.2.0
  geolocator: ^13.0.1
  camera: ^0.11.0
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
